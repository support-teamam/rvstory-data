name: Update rv task data

# Refreshes data/manifest.json whenever the dataset changes, and on a quarterly
# cadence. Data regeneration itself (expanding maintenance-schedule coverage) is
# done out-of-band — see the "regenerate" step note — but the manifest version +
# checksum are always kept correct and committed here so the app picks up changes
# without an App Store release.

on:
  workflow_dispatch: {}            # manual trigger
  push:
    paths:
      - 'data/rv-tasks.json'        # rebuild manifest when data is updated
  schedule:
    - cron: '0 9 1 */3 *'           # 09:00 UTC on the 1st, every 3rd month

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Plug your data-regeneration step in here when ready (e.g. a script or
      # Claude skill that expands data/rv-tasks.json). It is intentionally a
      # no-op for now; the manifest rebuild below handles whatever data exists.
      - name: Regenerate dataset (optional)
        run: echo "No automated regeneration configured yet — data updated manually."

      - name: Rebuild manifest
        run: node scripts/build-manifest.mjs

      - name: Commit manifest if changed
        run: |
          if [[ -n "$(git status --porcelain data/manifest.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/manifest.json
            git commit -m "chore: refresh data manifest [skip ci]"
            git push
          else
            echo "Manifest unchanged."
          fi
